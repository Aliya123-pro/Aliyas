name: Test Mode Offset v2

on:
  workflow_dispatch:
    inputs:
      accountFile:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install puppeteer-real-browser @octokit/rest
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb
      - name: Run
        env:
          ACCOUNT_FILE: ${{ github.event.inputs.accountFile }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          JP_PROXY_LIST: ${{ secrets.JP_PROXY_LIST }}
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET }}
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          node test-mode-offset-v2.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mode-offset-v2-screenshots
          path: screenshots/
